<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<!-- Game Screen -->
<div class="container" id="gameScreen">
    <h1>Tic Tac Toe</h1>
    <div id="status">Player X's Turn</div>

    <div class="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
</div>

<!-- Result Screen -->
<div class="container hidden" id="resultScreen">
    <h1 id="resultText"></h1>
    
    <button id="restartBtn"onclick="newGame()">newGame</button>
    
</div>

<script src="script.js"></script>
</body>
</html>
